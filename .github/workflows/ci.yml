name: CI

on:
  pull_request:
  push:
    branches: [main]

# Read access to GitHub Packages so npm can install the (public) design system.
permissions:
  contents: read
  packages: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # .npmrc reads ${GITHUB_TOKEN} to auth the @jasperlepardo scope.
      - run: npm ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npm run db:generate # prisma client (no DB needed) — required for typecheck
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
